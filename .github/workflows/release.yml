name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Match GitLab CI: cargo-husky's user-hooks feature would otherwise install
  # git hooks into .git/hooks during `cargo test`, polluting the CI checkout.
  CARGO_HUSKY_DONT_INSTALL_HOOKS: "true"

# Cancel-in-progress on the same tag (e.g. operator force-pushes the same
# v* tag while a prior run is still publishing). The crates.io
# already-published gate handles the post-success case; this handles the
# in-flight case.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          CARGO_VERSION="v$(cargo metadata --no-deps --format-version 1 \
            | python3 -c 'import sys, json; print(json.load(sys.stdin)["packages"][0]["version"])')"
          if [ "$CARGO_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Tag ${{ github.ref_name }} doesn't match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Run tests
        run: cargo test

      - name: Skip if version already published
        if: startsWith(github.ref, 'refs/tags/')
        id: already_published
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          # crates.io: 200 if this version exists (yanked or not), 404 if it doesn't.
          # Treat anything else (429 throttle, 5xx) as a hard failure — falling
          # through to publish on a non-deterministic answer would risk a duplicate
          # publish or a confusing "skipped because we couldn't check" outcome.
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" \
            "https://crates.io/api/v1/crates/glp/$VERSION")
          case "$STATUS" in
            200)
              echo "Version $VERSION already on crates.io — skipping publish step"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "Version $VERSION not yet on crates.io — will publish"
              echo "skip=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "ERROR: unexpected HTTP $STATUS from crates.io probe — aborting"
              exit 1
              ;;
          esac

      - name: Enable publishing
        if: startsWith(github.ref, 'refs/tags/') && steps.already_published.outputs.skip != 'true'
        run: sed -i 's/publish = false/publish = true/' Cargo.toml

      - name: Publish to crates.io
        if: startsWith(github.ref, 'refs/tags/') && steps.already_published.outputs.skip != 'true'
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
